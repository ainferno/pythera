<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Психолог — онлайн-консультации и запись на приём</title>
    <meta name="description" content="Индивидуальная психотерапия онлайн. Работа с тревогой, выгоранием, отношениями. Запись на удобное время." />
    <meta name="theme-color" content="#FAF7F2" />

    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- OpenGraph — canonical/absolute URLs will be filled in once a domain
         is registered. Relative /og.png works for same-origin previews
         (Telegram in-app browser) but most crawlers need absolute. -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="ru_RU" />
    <meta property="og:title" content="Психолог — онлайн-консультации" />
    <meta property="og:description" content="Индивидуальная психотерапия онлайн. Запись на удобное время." />
    <meta property="og:image" content="/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Психолог — онлайн-консультации" />
    <meta name="twitter:description" content="Индивидуальная психотерапия онлайн. Запись на удобное время." />
    <meta name="twitter:image" content="/og.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
